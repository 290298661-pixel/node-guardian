name: Code Quality & Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  shellcheck:
    name: Run ShellCheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Lint Executable Scripts
        run: |
          echo "Scanning executable scripts in bin/..."
          for file in bin/*; do
            if [ -f "$file" ]; then
              shellcheck -x "$file"
            fi
          done

      - name: Lint Library Files
        run: |
          echo "Scanning library files in lib/..."
          shellcheck -x lib/*.sh

      - name: Lint Test Files
        run: |
          echo "Scanning BATS test files in tests/..."
          find tests -name '*.bats' -o -name '*.bash' | xargs -r shellcheck -x --severity=warning

  bats-test:
    name: Run BATS Tests
    runs-on: ubuntu-latest
    needs: shellcheck

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install BATS
        run: |
          sudo apt-get install -y bats
          bats --version

      - name: Run Unit Tests
        run: |
          echo "Running BATS test suite..."
          mkdir -p test-results
          bats tests/ --recursive --verbose-run 2>&1 | tee test-results/bats-output.txt
        continue-on-error: false
