# ====================================================================
# node-guardian: 灾备目标清单 (config/backup_targets.conf)
# 格式: <标签>|<路径>|<类型: file|dir>|[exclude]|[max_size_mb]
#   - 标签: 归档中的目标名称
#   - 路径: 备份源路径
#   - 类型: file 或 dir
#   - exclude: 可选，逗号分隔的排除模式（仅 dir 类型生效）
#   - max_size_mb: 可选，大小上限(MB)，超出则跳过
# ====================================================================

# K8s 核心配置
kubelet-config|/var/lib/kubelet/config.yaml|file
# 排除容器日志与临时数据，限制 500M 防止备份膨胀
kubelet-state|/var/lib/kubelet|dir|*.log,cache,tmp|500

# 容器运行时配置
containerd-config|/etc/containerd/config.toml|file
docker-config|/etc/docker/daemon.json|file

# CNI 网络配置
cni-config|/etc/cni/net.d|dir

# 内核调优持久化配置
sysctl-custom|/etc/sysctl.d|dir

# 静态 Pod 清单 (控制平面节点)
static-pod-manifests|/etc/kubernetes/manifests|dir

# kubeadm 配置
kubeadm-config|/etc/kubernetes/kubeadm-config.yaml|file
