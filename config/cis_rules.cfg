# ====================================================================
# node-guardian: CIS 安全基线规则 (config/cis_rules.cfg)
# 用于 kn-security 安全审计模块
# ====================================================================

# ------------------------------------------------------------------
# 1. Kubelet 安全参数审计基线
#    格式: KUBELET_CHECK_<parameter>=<expected_value>
# ------------------------------------------------------------------
KUBELET_CHECK_anonymous-auth=false
KUBELET_CHECK_read-only-port=0
KUBELET_CHECK_authorization-mode=Webhook

# ------------------------------------------------------------------
# 2. 高危端口清单 - 不应在 K8s 节点上监听
#    格式: RISK_PORT=<port>:<protocol>:<description>
# ------------------------------------------------------------------
RISK_PORT=21:TCP:FTP
RISK_PORT=23:TCP:Telnet
RISK_PORT=25:TCP:SMTP
RISK_PORT=111:TCP:RPCBIND
RISK_PORT=135:TCP:MSRPC
RISK_PORT=139:TCP:NetBIOS
RISK_PORT=445:TCP:SMB
RISK_PORT=2049:TCP:NFS
RISK_PORT=3306:TCP:MySQL
RISK_PORT=5432:TCP:PostgreSQL
RISK_PORT=6379:TCP:Redis (无认证)
RISK_PORT=27017:TCP:MongoDB (无认证)

# ------------------------------------------------------------------
# 3. 必需安全服务
#    格式: REQUIRED_SERVICE=<service_name>
# ------------------------------------------------------------------
REQUIRED_SERVICE=auditd
